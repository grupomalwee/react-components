apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: storybook-healthcheck
  namespace: react-components-storybook
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 15
    healthyThreshold: 1
    unhealthyThreshold: 2
    logConfig:
      enabled: true
    config:
      type: HTTP
      httpHealthCheck:
        portSpecification: USE_SERVING_PORT
        requestPath: /livez
  targetRef:
    group: ""
    kind: Service
    name: react-components-storybook